syntax = "proto3";
package sports;

option go_package = "/sports";

import "google/protobuf/timestamp.proto";

service Sports {
  // ListEvents will return a collection of all events.
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse) {}
}

/* Requests/Responses */

message ListEventsRequest {
  ListEventsRequestFilter filter = 1;
}

// Response to ListEvents call.
message ListEventsResponse {
  repeated Event events = 1;
}

// Filter for listing events.
message ListEventsRequestFilter {
  repeated string sport_types = 1;
  repeated string leagues = 2;
  repeated string locations = 3;
  bool visible_only = 4;
}

/* Resources */

// A event resource.
message Event {
  // ID represents a unique identifier for the event.
  int64 id = 1;
  // Name is the official name given to the event.
  string name = 2;
  // SportType represents the type of sport.
  string sport_type = 3;
  // League represents the league of the event.
  string league = 4;
  // Location represents the location of the event.
  string location = 5;
  // Visible represents whether or not the event is visible.
  bool visible = 6;
  // AdvertisedStartTime is the time the event is advertised to run.
  google.protobuf.Timestamp advertised_start_time = 7;
  // Status represents the status of the event.
  EventStatus status = 8;
}

// Enum for event status.
enum EventStatus {
  NOT_STARTED = 0;
  IN_PLAY = 1;
  COMPLETED = 2;
  CANCELLED = 3;
}